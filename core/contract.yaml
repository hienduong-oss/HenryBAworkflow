  "patterns": {
    "date_token": "^\\d{6}-\\d{4}$",
    "project_dir": "^(.+)-(\\d{6}-\\d{4})$"
  },
  "resolution": {
    "slug_sources": ["explicit", "project_directories"],
    "date_sources": ["explicit", "project_directory"],
    "module_sources": ["explicit", "single_module_only"],
    "strict_exact_match": true,
    "never_use_mtime": true
  },
  "legacy": {
    "roots": ["plans/reports", "plans/reports/final", "plans/reports/drafts"],
    "blocked_patterns": ["plans/reports/002-intake-form.md", "plans/reports/002-gap-analysis.md", "plans/reports/002-*.md", "plans/reports/final/*", "plans/reports/drafts/*"]
  },
  "commands": {
    "intake": {
      "module_required": false,
      "mutable": true,
      "requires": [],
      "outputs": ["project_home", "source_summary", "source_chunks_dir", "source_chunk_index", "intake", "plan"]
    },
    "impact": {
      "module_required": false,
      "mutable": false,
      "requires": ["intake"],
      "outputs": []
    },
    "options": {
      "module_required": false,
      "mutable": true,
      "requires": ["intake"],
      "outputs": ["project_home", "plan", "options_index", "options_comparison"]
    },
    "backbone": {
      "module_required": false,
      "mutable": true,
      "requires": ["intake"],
      "outputs": ["project_home", "backbone", "backbone_index", "common_rules", "message_list", "shared_rule_message_index", "control_type_library", "project_memory", "design_doc", "shared_shell_contract", "shared_shell_index"],
      "notes": "System-level artifact. When UI-backed scope exists, backbone MUST create design_doc and shared_shell_contract covering ALL portals in the Portal Matrix. Module BAs must not create or modify these files."
    },
    "frd": {
      "module_required": true,
      "mutable": true,
      "requires": ["backbone"],
      "outputs": ["frd"]
    },
    "stories": {
      "module_required": true,
      "mutable": true,
      "requires": ["backbone"],
      "outputs": ["userstories_index", "userstory_item"]
    },
    "srs": {
      "module_required": true,
      "mutable": true,
      "requires": ["backbone", "userstories_index"],
      "outputs": ["srs_spec", "srs_flows", "srs_states", "srs_erd", "usecases_index", "usecase_item", "usecase_diagrams", "ascii_screen_index", "ascii_screen_item", "srs", "srs_compile_receipt", "screen_field_contract"],
      "notes": "Canon-first SRS command. Source set is folder-based: srs/spec.md, srs/flows.md, srs/states.md, srs/erd.md, usecases/*, ascii-screen/*. srs.md is compiled output only. Receipt must define requested scope and source hashes. Backbone authority: module artifacts must trace to backbone; misalignment produces BACKBONE_ALIGNMENT_FAIL. DESIGN.md and shared-shell-contract are system-level prerequisites (created by backbone), not SRS outputs."
    },
    "wireframes": {
      "module_required": true,
      "mutable": false,
      "requires": ["ascii_screen_index", "srs_compile_receipt"],
      "outputs": [],
      "notes": "Deprecated compatibility inspection command. Do not create legacy wireframe pack artifacts. ASCII wireframes are mandatory inside ascii-screen canon files and compiled through srs."
    },
    "figma-sync": {
      "module_required": true,
      "mutable": true,
      "requires": ["ascii_screen_index", "srs_compile_receipt", "design_doc", "shared_shell_contract"],
      "outputs": ["figma_sync_report", "figma_mismatch_report"],
      "notes": "Separate downstream visual consumer. Reads ascii-screen/index.md and screen files. It may interact with Figma MCP and write sync/mismatch reports, but it must not mutate BA canon sources, shared shell contracts, or compiled SRS."
    },
    "stitch-sync": {
      "module_required": true,
      "mutable": true,
      "requires": ["ascii_screen_index", "srs_compile_receipt", "design_doc", "shared_shell_contract"],
      "outputs": ["stitch_sync_report", "stitch_mismatch_report", "stitch_design_system_id", "stitch_screen_map"],
      "notes": "Downstream visual consumer. Reads screen canon and DESIGN.md, bootstraps Stitch design system, generates consistent UI screens via Stitch MCP. Must not mutate BA canon sources, shared shell contracts, or compiled SRS. Blocks immediately if Stitch MCP is unreachable. Supports --device DESKTOP|MOBILE|TABLET|AGNOSTIC (default DESKTOP). Refresh triggers full regeneration — old screens destroyed."
    },
    "package": {
      "module_required": false,
      "mutable": true,
      "requires": [],
      "outputs": ["compiled_frd", "compiled_srs"]
    },
    "status": {
      "module_required": false,
      "mutable": false,
      "requires": [],
      "outputs": []
    },
    "next": {
      "module_required": false,
      "mutable": false,
      "requires": [],
      "outputs": []
    },
    "reverse": {
      "module_required": false,
      "mutable": true,
      "requires": [],
      "outputs": ["reverse_baseline_lock", "reverse_index", "reverse_read_manifest"],
      "notes": "Entry command for reverse mode. Performs baseline scan and locks documented_commit. Requires focus_selection before evidence promotion."
    },
    "reverse_status": {
      "module_required": false,
      "mutable": false,
      "requires": ["reverse_baseline_lock"],
      "outputs": [],
      "notes": "Shows reverse lane progress: baseline lock state, focus areas, drift status, evidence ledger summary."
    },
    "reverse_refresh": {
      "module_required": false,
      "mutable": true,
      "requires": ["reverse_baseline_lock"],
      "outputs": ["reverse_index", "reverse_drift_state", "reverse_read_manifest"],
      "notes": "Re-scans codebase/docs against a new commit. Updates drift state relative to documented_commit."
    },
    "reverse_promote": {
      "module_required": false,
      "mutable": true,
      "requires": ["reverse_baseline_lock", "reverse_evidence_ledger"],
      "outputs": ["backbone", "backbone_index"],
      "notes": "Promotes validated evidence from reverse_evidence_ledger into canonical backbone or SRS. Requires explicit user approval per promotion batch."
    },
    "reverse_impact": {
      "module_required": false,
      "mutable": false,
      "requires": ["reverse_baseline_lock", "reverse_evidence_ledger"],
      "outputs": [],
      "notes": "Classifies each pending change as as_built_drift, future_state_request, or mixed_change. Does not mutate artifacts."
    },
    "qc-review": {
      "module_required": true,
      "mutable": false,
      "requires": ["srs"],
      "outputs": ["qc_report", "qc_backlog"],
      "notes": "Audit module SRS canon for test-readiness. Non-mutable: reads backbone first, then userstories/index.md, usecases/index.md, ascii-screen/index.md, srs/spec.md, srs/flows.md, srs/states.md, srs/erd.md. Compiled srs.md is supporting evidence only. Backbone alignment gate runs before scoring."
    }
  },
  "quality_gates": {
    "post_srs_module_qc": {
      "invoke": "qc-review",
      "min_version": "1.0.0",
      "profile": "full-10ka",
      "platform": "${defaults.platform}",
      "block_on": "score < 70",
      "trigger_after": "srs"
    }
  },
  "behavior_shards": {
    "intake": ["behavior_intake"],
    "options": ["behavior_backbone"],
    "backbone": ["behavior_backbone"],
    "impact": ["behavior_impact"],
    "frd": ["behavior_module_authoring"],
    "stories": ["behavior_module_authoring"],
    "srs": ["behavior_srs"],
    "wireframes": ["behavior_wireframes"],
    "figma-sync": ["behavior_figma_sync"],
    "stitch-sync": ["behavior_stitch_sync"],
    "package": ["behavior_package_status_next"],
    "status": ["behavior_package_status_next"],
    "next": ["behavior_package_status_next"],
    "reverse": ["behavior_reverse"],
    "reverse_status": ["behavior_reverse"],
    "reverse_refresh": ["behavior_reverse"],
    "reverse_promote": ["behavior_reverse"],
    "reverse_impact": ["behavior_reverse"],
    "qc-review": ["behavior_qc_review"]
  },
  "source_of_truth_order": ["backbone", "intake"],
  "next_step_order": ["intake", "options", "backbone", "frd", "stories", "srs", "stitch-sync", "package", "status"],
  "reverse": {
    "canonical": false,
    "evidence_zone": true,
    "note": "00_reverse artifacts are supporting evidence only. They are NOT in source_of_truth_order. Canonical artifacts (backbone, SRS, FRD) remain the source of truth. Reverse evidence must be explicitly promoted via reverse_promote before it affects canonical artifacts.",
    "documented_commit_required": true,
    "v1_constraints": {
      "source_only": true,
      "no_runtime_probes": true,
      "no_app_execution": true,
      "no_live_endpoint_verification": true
    },
    "change_lanes": ["as_built_drift", "future_state_request", "mixed_change"]
  },
  "routing": {
    "impact": {
      "scope_lock_change": "intake",
      "backbone_change": "backbone",
      "story_detail_change": "stories",
      "srs_behavior_change": "srs",
      "ui_impact_follow_up": "srs"
    }
  },
  "output_modes": {
    "probe": {
      "fields": ["output_mode", "status", "command", "resolved_slug", "message"],
      "use_when": "no-op, clarification, or block verdict"
    },
    "delta": {
      "fields": ["output_mode", "status", "command", "resolved_slug", "message", "indexes", "action_guardrail", "allow_reads", "excerpt_path"],
      "use_when": "index-first action with changed state"
    },
    "full": {
      "fields": ["output_mode", "status", "command", "resolved_slug", "message", "indexes", "action_guardrail", "allow_reads", "excerpt_path", "deny_reads", "canonical_state_summary", "canonical_next_command", "refresh_command"],
      "use_when": "escalation, broad read, or first-run with no index"
    }
  },
  "templates": {
    "manifest": "templates/manifest.json"
  },
  "memory": {
    "compact_fallback": "active when only project_memory file exists and memory_root directory is absent",
    "index_role": "bounded navigator routing to shards and modules; must not become a second monolith",
    "log_role": "optional append-only chronology support; excluded from normal command reads",
    "cold_default": "never loaded by default; only via explicit escalation",
    "shard_tree_optional": true,
    "migration_scope_excludes_roadmap_dirs": true
  },
  "activation": {
    "levels": ["Base", "Modular", "Program"],
    "default": "Base",
    "provisional_until_fixture_validation": false,
    "thresholds": {
      "modular": {
        "any_of": [
          {
            "signal": "module_count",
            "operator": "gte",
            "value": 2
          },
          {
            "signal": "owner_count",
            "operator": "gte",
            "value": 2
          }
        ]
      },
      "program": {
        "any_of": [
          {
            "signal": "cross_module_dependency",
            "operator": "equals",
            "value": true
          },
          {
            "signal": "delegation_slice_count",
            "operator": "gte",
            "value": 2
          },
          {
            "all_of": [
              {
                "signal": "owner_count",
                "operator": "gte",
                "value": 2
              },
              {
                "signal": "delegation_slice_count",
                "operator": "gte",
                "value": 1
              }
            ]
          }
        ]
      }
    },
    "signals": {
      "module_count": {
        "source": "count module directories under paths.module_root parent",
        "compact_fallback": 1
      },
      "owner_count": {
        "source": "distinct owners declared in memory index/module metadata",
        "compact_fallback": 1
      },
      "cross_module_dependency": {
        "source": "explicit flag or listed dependency in memory index",
        "compact_fallback": false
      },
      "delegation_slice_count": {
        "source": "count active/queued trackers under paths.delegation_root, excluding archive",
        "compact_fallback": 0
      },
      "source_chunk_count": {
        "source": "count chunk files under paths.source_chunks_dir",
        "compact_fallback": 0
      },
      "backbone_bytes": {
        "source": "byte size of paths.backbone",
        "compact_fallback": 0
      },
      "stories_bytes": {
        "source": "sum byte size of userstory item files under paths.userstories_root",
        "compact_fallback": 0
      },
      "srs_total_bytes": {
        "source": "sum byte size of paths.srs and srs source files under paths.srs_root",
        "compact_fallback": 0
      },
      "artifact_total_bytes": {
        "source": "sum byte size of active BA artifacts under paths.project_root",
        "compact_fallback": 0
      }
    },
    "context_thresholds": {
      "source_chunk_count": 8,
      "backbone_bytes": 25000,
      "stories_bytes": 25000,
      "srs_total_bytes": 30000,
      "artifact_total_bytes": 80000
    },
    "lifecycle": {
      "auto_escalation": true,
      "auto_downgrade": false,
      "downgrade_requires": "explicit activation refresh after archival or project simplification",
      "threshold_locking": "locked for v1 after fixture validation; runtime parity execution is exempted by maintainer release decision"
    },
    "persisted_state_path": "paths.memory_index",
    "compact_fallback_state_path": "paths.project_memory"
  }
}
