{
  "version": 1,
  "defaults": {
    "language": "vi",
    "date_token_format": "YYMMDD-HHmm",
    "mode": "hybrid",
    "ui_baseline": "Shadcn UI"
  },
  "states": {
    "wireframe": [
      "completed",
      "skipped",
      "not-applicable",
      "missing"
    ],
    "delegation": [
      "queued",
      "running",
      "completed",
      "needs-repartition",
      "blocked",
      "failed"
    ],
    "heartbeat_minutes": 5,
    "stall_after_minutes": 10,
    "presale": [
      "bootstrap",
      "domain-study",
      "clarify",
      "build",
      "handed-off"
    ]
  },
  "paths": {
    "project_root": "plans/{slug}-{date}",
    "source_cache_root": "plans/_source-cache/{source_hash}",
    "source_promoted_root": "plans/{slug}-{date}/00_source",
    "source_manifest": "plans/{slug}-{date}/00_source/manifest.json",
    "source_summary": "plans/{slug}-{date}/00_source/summary.md",
    "source_chunks_dir": "plans/{slug}-{date}/00_source/chunks",
    "design_root": "designs/{slug}",
    "compiled_root": "plans/{slug}-{date}/04_compiled",
    "delegation_root": "plans/{slug}-{date}/delegation",
    "intake": "plans/{slug}-{date}/01_intake/intake.md",
    "plan": "plans/{slug}-{date}/01_intake/plan.md",
    "backbone": "plans/{slug}-{date}/02_backbone/backbone.md",
    "module_root": "plans/{slug}-{date}/03_modules/{module_slug}",
    "frd": "plans/{slug}-{date}/03_modules/{module_slug}/frd.md",
    "stories": "plans/{slug}-{date}/03_modules/{module_slug}/user-stories.md",
    "srs": "plans/{slug}-{date}/03_modules/{module_slug}/srs.md",
    "srs_group": "plans/{slug}-{date}/03_modules/{module_slug}/srs-group-{group}.md",
    "wireframe_input": "plans/{slug}-{date}/03_modules/{module_slug}/wireframe-input.md",
    "wireframe_map": "plans/{slug}-{date}/03_modules/{module_slug}/wireframe-map.md",
    "wireframe_state": "plans/{slug}-{date}/03_modules/{module_slug}/wireframe-state.md",
    "compiled_frd": "plans/{slug}-{date}/04_compiled/compiled-frd.html",
    "compiled_srs": "plans/{slug}-{date}/04_compiled/compiled-srs.html",
    "design_doc": "designs/{slug}/DESIGN.md",
    "presale_root": "plans/{slug}-{date}/00_presale",
    "presale_inputs_root": "plans/{slug}-{date}/00_presale/00-inputs",
    "presale_inputs_requirements": "plans/{slug}-{date}/00_presale/00-inputs/requirements",
    "presale_inputs_discussions": "plans/{slug}-{date}/00_presale/00-inputs/discussions",
    "presale_inputs_technical": "plans/{slug}-{date}/00_presale/00-inputs/technical",
    "presale_inputs_references": "plans/{slug}-{date}/00_presale/00-inputs/references",
    "presale_domain_primer": "plans/{slug}-{date}/00_presale/00-domain-primer.md",
    "presale_clarifications": "plans/{slug}-{date}/00_presale/05-clarifications.md",
    "presale_wbs_md": "plans/{slug}-{date}/00_presale/10-wbs-content.md",
    "presale_wbs_csv": "plans/{slug}-{date}/00_presale/10-wbs-content.csv",
    "presale_proposal_md": "plans/{slug}-{date}/00_presale/20-proposal-content.md",
    "presale_output_root": "plans/{slug}-{date}/00_presale/_output",
    "presale_wbs_xlsx": "plans/{slug}-{date}/00_presale/_output/10-wbs-final.xlsx",
    "presale_proposal_docx": "plans/{slug}-{date}/00_presale/_output/20-proposal-final.docx",
    "presale_state_cards": "plans/{slug}-{date}/00_presale/_state-cards",
    "presale_changelog": "plans/{slug}-{date}/00_presale/_changelog",
    "handoff_intake_sources": "plans/{slug}-{date}/01_intake/_sources",
    "handoff_manifest": "plans/{slug}-{date}/01_intake/handoff-manifest.md",
    "style_spec": "templates/output-style-spec.json"
  },
  "patterns": {
    "date_token": "^\\d{6}-\\d{4}$",
    "project_dir": "^(.+)-(\\d{6}-\\d{4})$"
  },
  "resolution": {
    "slug_sources": [
      "explicit",
      "project_directories"
    ],
    "date_sources": [
      "explicit",
      "project_directory"
    ],
    "module_sources": [
      "explicit",
      "single_module_only"
    ],
    "strict_exact_match": true,
    "never_use_mtime": true
  },
  "legacy": {
    "roots": [
      "plans/reports",
      "plans/reports/final",
      "plans/reports/drafts"
    ],
    "blocked_patterns": [
      "plans/reports/002-intake-form.md",
      "plans/reports/002-gap-analysis.md",
      "plans/reports/002-*.md",
      "plans/reports/final/*",
      "plans/reports/drafts/*"
    ]
  },
  "commands": {
    "intake": {
      "module_required": false,
      "mutable": true,
      "requires": [],
      "outputs": [
        "intake",
        "plan"
      ]
    },
    "impact": {
      "module_required": false,
      "mutable": false,
      "requires": [
        "intake"
      ],
      "outputs": []
    },
    "backbone": {
      "module_required": false,
      "mutable": true,
      "requires": [
        "intake"
      ],
      "outputs": [
        "backbone"
      ]
    },
    "frd": {
      "module_required": true,
      "mutable": true,
      "requires": [
        "backbone"
      ],
      "outputs": [
        "frd"
      ]
    },
    "stories": {
      "module_required": true,
      "mutable": true,
      "requires": [
        "backbone"
      ],
      "outputs": [
        "stories"
      ]
    },
    "srs": {
      "module_required": true,
      "mutable": true,
      "requires": [
        "backbone",
        "stories"
      ],
      "outputs": [
        "srs",
        "wireframe_input"
      ]
    },
    "wireframes": {
      "module_required": true,
      "mutable": true,
      "requires": [
        "wireframe_input"
      ],
      "outputs": [
        "design_doc",
        "wireframe_map",
        "wireframe_state"
      ]
    },
    "package": {
      "module_required": false,
      "mutable": true,
      "requires": [],
      "outputs": [
        "compiled_frd",
        "compiled_srs"
      ]
    },
    "status": {
      "module_required": false,
      "mutable": false,
      "requires": [],
      "outputs": []
    },
    "next": {
      "module_required": false,
      "mutable": false,
      "requires": [],
      "outputs": []
    },
    "presale": {
      "module_required": false,
      "mutable": true,
      "requires": [],
      "outputs": [
        "presale_domain_primer"
      ],
      "phase": "bootstrap"
    },
    "presale_clarify": {
      "module_required": false,
      "mutable": true,
      "requires": [
        "presale_domain_primer"
      ],
      "outputs": [
        "presale_clarifications"
      ]
    },
    "presale_build": {
      "module_required": false,
      "mutable": true,
      "requires": [
        "presale_domain_primer",
        "presale_clarifications"
      ],
      "outputs": [
        "presale_wbs_md",
        "presale_wbs_csv",
        "presale_proposal_md",
        "presale_wbs_xlsx",
        "presale_proposal_docx"
      ]
    },
    "presale_status": {
      "module_required": false,
      "mutable": false,
      "requires": [],
      "outputs": []
    },
    "presale_handoff": {
      "module_required": false,
      "mutable": true,
      "requires": [
        "presale_wbs_md",
        "presale_proposal_md"
      ],
      "outputs": [
        "intake",
        "handoff_manifest"
      ]
    }
  },
  "source_of_truth_order": [
    "backbone",
    "intake"
  ],
  "next_step_order": [
    "intake",
    "backbone",
    "frd",
    "stories",
    "srs",
    "wireframes",
    "package",
    "status"
  ],
  "routing": {
    "impact": {
      "scope_lock_change": "intake",
      "backbone_change": "backbone",
      "story_detail_change": "stories",
      "srs_behavior_change": "srs",
      "ui_impact_follow_up": "wireframes"
    }
  },
  "templates": {
    "manifest": "templates/manifest.json",
    "output_style_spec": "templates/output-style-spec.json",
    "domain_primer": "templates/domain-primer-template.md",
    "wbs_md": "templates/wbs-template.md",
    "wbs_csv": "templates/wbs-template.csv",
    "proposal_md": "templates/proposal-template.md",
    "clarifications": "templates/clarifications-template.md",
    "proposal_guide": "templates/proposal-guide.md"
  },
  "presale": {
    "agents": {
      "lead": "presale-lead",
      "wbs": "wbs-builder",
      "proposal": "proposal-writer"
    },
    "models": {
      "lead": "opus",
      "domain_study": "opus",
      "clarify": "opus",
      "wbs": "sonnet",
      "proposal": "sonnet",
      "bootstrap": "sonnet",
      "handoff": "sonnet"
    },
    "user_gates": [
      "after_domain_study",
      "after_clarify",
      "after_build",
      "before_handoff"
    ],
    "auto_render_on_build": true,
    "no_cross_project_recall": true,
    "auto_derive_workspace": true,
    "language": {
      "artifacts_to_client": "en",
      "domain_primer": "vi",
      "agent_summaries": "vi",
      "command_descriptions": "en"
    },
    "source_ref_formats": [
      "[src:client:<file>§<sec>]",
      "[src:domain:§<n>]",
      "[src:clarify:Q<n>]",
      "[src:assumption:A<n>]",
      "[src:wbs:<id>]"
    ],
    "handoff_bundle": [
      "presale_inputs_root",
      "presale_domain_primer",
      "presale_clarifications",
      "presale_wbs_md",
      "presale_proposal_md"
    ]
  }
}
