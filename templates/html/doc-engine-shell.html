<!DOCTYPE html>
<html class="light" lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{title}</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<!-- Tailwind -->
{tailwind_config}
<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
body { background-color: #f7f9fb; color: #191c1e; }
.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #c3c6d7; border-radius: 10px; }

/* Typography */
.content h1 { font-family: Inter, sans-serif; font-size: 2rem; font-weight: 700; color: #191c1e; margin: 2rem 0 1rem; line-height: 1.3; }
.content h2 { font-family: Inter, sans-serif; font-size: 1.5rem; font-weight: 600; color: #191c1e; margin: 2rem 0 0.75rem; line-height: 1.3; border-bottom: 1px solid #c3c6d7; padding-bottom: 0.5rem; }
.content h3 { font-family: Inter, sans-serif; font-size: 1.15rem; font-weight: 600; color: #434655; margin: 1.5rem 0 0.5rem; }
.content h4 { font-family: Inter, sans-serif; font-size: 1rem; font-weight: 600; color: #505f76; margin: 1.25rem 0 0.5rem; }
.content p { font-family: 'Source Serif 4', serif; font-size: 1rem; line-height: 1.7; margin: 0.5rem 0 1rem; color: #191c1e; }

/* Tables — critical: old HTML uses plain <table> without classes */
.content table { width: 100%; border-collapse: collapse; margin: 1.25rem 0 2rem; font-size: 0.875rem; overflow-x: auto; display: block; }
.content thead { border-bottom: 2px solid #c3c6d7; }
.content th { font-family: Inter, sans-serif; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #434655; background: #e6e8ea; padding: 0.75rem 1rem; text-align: left; white-space: nowrap; }
.content td { padding: 0.6rem 1rem; border-bottom: 1px solid #e0e3e5; vertical-align: top; color: #191c1e; }
.content tr:nth-child(even) td { background: #f7f9fb; }
.content tr:hover td { background: #d0e1fb; }

/* Code */
.content pre { background: #2d3133; color: #eff1f3; padding: 1rem 1.25rem; border-radius: 0.375rem; overflow-x: auto; margin: 1rem 0; font-size: 0.85rem; }
.content pre code { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; background: none; padding: 0; }
.content code { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; background: #e6e8ea; padding: 0.15rem 0.4rem; border-radius: 0.25rem; }

/* Mermaid */
.content .mermaid { text-align: center; margin: 1.5rem 0; }
.content .mermaid svg { max-width: 100%; }

/* Lists */
.content ul, .content ol { padding-left: 1.5rem; margin: 0.5rem 0 1rem; }
.content li { margin-bottom: 0.25rem; }

/* Blockquote */
.content blockquote { border-left: 4px solid #2563eb; padding: 0.5rem 1rem; color: #434655; background: #eceef0; margin: 1rem 0; border-radius: 0 0.25rem 0.25rem 0; }

/* HR */
.content hr { border: none; border-top: 1px solid #c3c6d7; margin: 2rem 0; }

/* Links */
.content a { color: #004ac6; text-decoration: underline; }
.content a:hover { color: #003694; }

/* Images */
.content img { max-width: 100%; border-radius: 0.25rem; }

/* TOC from old HTML — hidden (nav sidebar has TOC) */
.content .toc, .content .toc-1, .content .toc-2, .content .toc-3, .content .toc-4, .content .toc-5 { display: none; }

{print_styles}
</style>
</head>
<body class="font-body-md text-body-md selection:bg-primary-container selection:text-on-primary-container" data-artifact-type="{doc_type}">
<div class="flex min-h-screen">
<!-- Sidebar -->
<aside class="fixed left-0 top-0 h-screen w-sidebar_width bg-surface-container-low border-r border-outline-variant flex flex-col py-stack_md overflow-y-auto custom-scrollbar">
<div class="px-6 mb-8">
<span class="font-h3 text-h3 font-bold text-on-surface block mb-2">BA-kit</span>
<div class="font-h4 text-h4 font-semibold text-on-surface">{badge}</div>
<div class="text-[12px] text-on-surface-variant uppercase tracking-wider mt-1">{project_name}</div>
</div>
<nav class="flex-1">
<ul class="space-y-1">
{toc_items}
</ul>
</nav>
<div class="px-6 mt-auto pt-6 border-t border-outline-variant/30">
<p class="text-[11px] text-on-surface-variant">{generated_date}</p>
</div>
</aside>
<!-- Main Content -->
<main class="flex-1 ml-sidebar_width">
<div class="max-w-content_max_width mx-auto px-6 lg:px-12 py-12">
<!-- Hero -->
<article class="mb-stack_lg">
<h1 class="font-h1 text-h1 text-on-surface mb-4">{title}</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl leading-relaxed">{summary}</p>
</article>
<hr class="border-outline-variant mb-stack_lg">
<!-- Content -->
<div class="content">
{body}
</div>
</div>
<!-- Footer -->
<footer class="w-full mt-stack_lg border-t border-outline-variant bg-surface py-8 px-12">
<p class="text-sm text-on-surface-variant text-center">{footer_text}</p>
</footer>
</main>
</div>
<!-- Scroll spy -->
<script>
(function() {
    const sectionIds = {section_ids_json};
    const links = document.querySelectorAll('aside nav a[href^="#"]');
    links.forEach(function(link) {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            var id = this.getAttribute('href').substring(1);
            var el = document.getElementById(id);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
        });
    });
    window.addEventListener('scroll', function() {
        var current = '';
        sectionIds.forEach(function(id) {
            var el = document.getElementById(id);
            if (el && el.getBoundingClientRect().top <= 150) current = id;
        });
        links.forEach(function(link) {
            var href = link.getAttribute('href');
            var isActive = href && href.substring(1) === current;
            link.classList.toggle('text-primary', isActive);
            link.classList.toggle('bg-primary/5', isActive);
            link.classList.toggle('border-primary', isActive);
            link.classList.toggle('font-bold', isActive);
            link.classList.toggle('text-on-surface-variant', !isActive);
            link.classList.toggle('border-transparent', !isActive);
        });
    });
})();
</script>
<!-- Mermaid -->
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>mermaid.initialize({ startOnLoad: true });</script>
</body>
</html>
